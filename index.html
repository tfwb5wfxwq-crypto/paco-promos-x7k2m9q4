<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Promos Paco</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root{
    --ink:#17201b; --soft:#5e6b62; --faint:#93a096;
    --metro:#0a4aa0; --degrenne:#0f7a4f; --promo:#d6383a; --amber:#a7660f; --green:#0f7a4f;
    --glass:rgba(255,255,255,.55); --glass-strong:rgba(255,255,255,.72);
    --stroke:rgba(255,255,255,.75); --hair:rgba(120,135,125,.16);
    --blur:saturate(1.7) blur(22px);
    --gloss:inset 0 1px 0 rgba(255,255,255,.85), inset 0 -1px 0 rgba(255,255,255,.18);
    --lift:0 10px 30px rgba(28,48,38,.12);
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
  html,body{margin:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text",Inter,Roboto,"Segoe UI",sans-serif;
       color:var(--ink); font-size:15px; line-height:1.45; -webkit-font-smoothing:antialiased;
       padding-bottom:100px;
       background-color:#eef1ee;
       background-image:
         radial-gradient(90% 60% at 8% 0%, rgba(120,200,160,.20), transparent 60%),
         radial-gradient(80% 55% at 100% 2%, rgba(250,222,178,.20), transparent 58%),
         radial-gradient(120% 80% at 50% 102%, rgba(150,205,215,.14), transparent 60%);
       background-attachment:fixed;}
  .glass{background:var(--glass); -webkit-backdrop-filter:var(--blur); backdrop-filter:var(--blur);
         border:1px solid var(--stroke); box-shadow:var(--gloss), var(--lift);}
  /* HEADER */
  html{scroll-padding-top:124px}
  header{position:sticky; top:0; z-index:20; padding:10px 16px 8px;
         background:rgba(255,255,255,.64); -webkit-backdrop-filter:var(--blur); backdrop-filter:var(--blur);
         border-bottom:1px solid var(--hair);}
  .hrow{display:flex; align-items:center; justify-content:space-between; gap:10px}
  .brand{font-size:16px; font-weight:700; letter-spacing:-.02em}
  .majs{display:flex; flex-wrap:wrap; gap:6px 14px; margin-top:6px}
  .maj{display:inline-flex; align-items:center; gap:6px; font-size:11px; color:var(--soft)}
  .maj b{color:var(--ink); font-weight:600}
  .dot{width:6px; height:6px; border-radius:50%; background:var(--degrenne)}
  .dot.metro{background:var(--metro); box-shadow:0 0 0 3px rgba(10,74,160,.16)}
  .dot.degr{background:var(--degrenne); box-shadow:0 0 0 3px rgba(15,122,79,.16)}
  /* NAV */
  .nav{display:flex; gap:8px; overflow-x:auto; padding:9px 0 2px; scrollbar-width:none}
  .nav::-webkit-scrollbar{display:none}
  .chip{white-space:nowrap; font-size:13px; font-weight:600; color:var(--ink);
        background:rgba(255,255,255,.5); -webkit-backdrop-filter:blur(10px); backdrop-filter:blur(10px);
        border:1px solid var(--stroke); padding:9px 15px; border-radius:999px; box-shadow:var(--gloss)}
  .chip.on{background:rgba(23,32,27,.88); color:#fff; border-color:rgba(255,255,255,.2)}
  /* SECTION */
  section{padding:8px 14px 4px; scroll-margin-top:118px}
  .shead{display:flex; align-items:center; gap:12px; padding:20px 4px 13px}
  .semoji{width:42px; height:42px; flex:none; display:flex; align-items:center; justify-content:center; font-size:20px;
          border-radius:14px; background:var(--glass); border:1px solid var(--stroke);
          -webkit-backdrop-filter:var(--blur); backdrop-filter:var(--blur); box-shadow:var(--gloss)}
  .stitle{font-size:18px; font-weight:700; letter-spacing:-.02em; line-height:1.12}
  .ssub{font-size:12.5px; color:var(--soft); margin-top:2px}
  /* GRID + CARD */
  .grid{display:grid; grid-template-columns:1fr 1fr; gap:13px}
  .card{border-radius:18px; overflow:hidden; display:flex; flex-direction:column;
        background:var(--glass); -webkit-backdrop-filter:var(--blur); backdrop-filter:var(--blur);
        border:1px solid var(--stroke); box-shadow:var(--gloss), var(--lift)}
  .ph{position:relative; height:110px; display:flex; align-items:center; justify-content:center; padding:8px; overflow:hidden;
      background:linear-gradient(160deg, rgba(255,255,255,.55), rgba(255,255,255,.18))}
  .ph img.pim{position:relative; z-index:1; max-width:78%; max-height:92px; object-fit:contain; filter:drop-shadow(0 5px 8px rgba(30,45,35,.12))}
  .ph img.pim.dead{display:none}
  .ph .fb{position:absolute; inset:0; display:none; flex-direction:column; align-items:center; justify-content:center; gap:5px; color:var(--faint)}
  .ph .fb.show{display:flex} .ph img.pim.dead ~ .fb{display:flex}
  .ph .fb .e{font-size:30px} .ph .fb .f{font-size:11px; font-weight:600}
  .tl{position:absolute; top:10px; left:10px; display:flex; gap:5px}
  .tr{position:absolute; top:10px; right:10px}
  .pill{font-size:11px; font-weight:700; padding:4px 8px; border-radius:8px; line-height:1; box-shadow:var(--gloss); white-space:nowrap}
  .pill.remise{background:rgba(214,56,58,.92); color:#fff; -webkit-backdrop-filter:blur(6px); backdrop-filter:blur(6px)}
  .src{font-size:9px; font-weight:800; letter-spacing:.02em; padding:3px 6px; border-radius:7px; color:#fff; box-shadow:var(--gloss); white-space:nowrap}
  .src.metro{background:rgba(10,74,160,.92)} .src.degrenne{background:rgba(15,122,79,.92)}
  .cbody{padding:12px 13px 13px; display:flex; flex-direction:column; flex:1}
  .name{font-size:13.5px; font-weight:600; line-height:1.3; display:-webkit-box; -webkit-line-clamp:2;
        -webkit-box-orient:vertical; overflow:hidden; min-height:35px}
  .fmt{font-size:11.5px; color:var(--soft); margin-top:3px}
  .srcx{font-weight:700} .srcx.metro{color:var(--metro)} .srcx.degrenne{color:var(--degrenne)}
  .prow{display:flex; align-items:baseline; gap:7px; margin-top:9px; flex-wrap:wrap}
  .pnow{font-size:20px; font-weight:750; letter-spacing:-.025em}
  .punit{font-size:11px; color:var(--soft); font-weight:500}
  .pold{font-size:12px; color:var(--faint); text-decoration:line-through}
  .meta{margin-top:9px; display:flex; flex-direction:column; gap:5px}
  .tag{display:inline-flex; align-items:center; gap:5px; font-size:11.5px; font-weight:600; align-self:flex-start;
       padding:4px 9px; border-radius:9px; -webkit-backdrop-filter:blur(6px); backdrop-filter:blur(6px); box-shadow:var(--gloss)}
  .tag.ends{background:rgba(238,180,90,.28); color:var(--amber)} .tag.ends.soon{background:rgba(214,56,58,.18); color:var(--promo)}
  .tag.eco{background:rgba(15,122,79,.15); color:var(--green)}
  .tag.best{background:rgba(15,122,79,.92); color:#fff}
  .tag.warn{background:rgba(176,106,22,.18); color:var(--amber)}
  .pmes{font-size:11px; color:var(--faint); margin-top:3px}
  .marque{font-size:10px; font-weight:700; letter-spacing:.05em; text-transform:uppercase; color:var(--soft); margin-bottom:1px}
  /* COMPARATIF côte à côte */
  .clist{display:flex; flex-direction:column; gap:12px}
  .ccard{border-radius:18px; padding:13px; background:var(--glass); border:1px solid var(--stroke);
         box-shadow:var(--gloss),var(--lift); -webkit-backdrop-filter:var(--blur); backdrop-filter:var(--blur)}
  .cc-head{display:flex; gap:11px; align-items:center; margin-bottom:11px}
  .cc-img{width:54px; height:54px; flex:none; border-radius:12px; background:rgba(255,255,255,.55);
          display:flex; align-items:center; justify-content:center; overflow:hidden; font-size:26px}
  .cc-img img{max-width:100%; max-height:100%; object-fit:contain}
  .cc-name{font-size:14px; font-weight:650; line-height:1.2}
  .cc-vs{display:grid; grid-template-columns:1fr 1fr; gap:9px}
  .cc-side{border-radius:13px; padding:10px 8px; text-align:center; border:1px solid var(--stroke)}
  .cc-side.win{background:rgba(15,122,79,.13); border-color:rgba(15,122,79,.45)}
  .cc-side.lose{background:rgba(120,135,125,.08); opacity:.5}
  .cc-src{font-size:10px; font-weight:800; letter-spacing:.04em}
  .cc-src.metro{color:var(--metro)} .cc-src.degrenne{color:var(--degrenne)}
  .cc-px{font-size:19px; font-weight:750; margin-top:3px; letter-spacing:-.02em}
  .cc-mes{font-size:10.5px; color:var(--soft)}
  .cc-tag{font-size:9px; font-weight:800; color:#fff; background:var(--green); border-radius:6px; padding:2px 6px; margin-top:5px; display:inline-block}
  .cc-eco{font-size:12.5px; color:var(--green); font-weight:600; margin-top:11px; text-align:center}
  .ccard .add{margin-top:11px}
  .reason{font-size:11.5px; color:var(--soft); display:flex; gap:5px; align-items:flex-start; line-height:1.3}
  .reason .ck{color:var(--green); font-weight:800}
  .add{margin-top:12px; border:0; width:100%; padding:12px; border-radius:13px; color:#fff; font-size:14px; font-weight:650;
       background:rgba(23,32,27,.9); -webkit-backdrop-filter:blur(8px); backdrop-filter:blur(8px);
       box-shadow:var(--gloss); display:flex; align-items:center; justify-content:center; gap:7px}
  .stepper{margin-top:12px; display:flex; align-items:center; justify-content:space-between;
           background:rgba(255,255,255,.45); border:1px solid var(--stroke); border-radius:13px; padding:4px; box-shadow:var(--gloss)}
  .sb{width:40px; height:36px; border:0; background:rgba(255,255,255,.85); border-radius:10px; font-size:20px;
      font-weight:700; color:var(--ink); box-shadow:0 1px 3px rgba(0,0,0,.07)}
  .sn{font-size:15px; font-weight:750; min-width:24px; text-align:center}
  /* CART BAR */
  .cartbar{position:fixed; left:0; right:0; bottom:0; z-index:30; display:none;
           padding:12px 14px calc(12px + env(safe-area-inset-bottom));
           background:rgba(255,255,255,.6); -webkit-backdrop-filter:var(--blur); backdrop-filter:var(--blur);
           border-top:1px solid var(--stroke)}
  .cartbar.show{display:block}
  .cbtn{width:100%; border:0; padding:15px 18px; border-radius:16px; color:#fff; font-size:15.5px; font-weight:700;
        background:rgba(15,122,79,.92); -webkit-backdrop-filter:blur(8px); backdrop-filter:blur(8px);
        box-shadow:var(--gloss), 0 8px 22px rgba(15,122,79,.32); display:flex; align-items:center; justify-content:space-between}
  .cbtn .l{display:flex; align-items:center; gap:9px}
  .cbtn .badge{background:rgba(255,255,255,.25); min-width:24px; height:24px; border-radius:8px; display:flex;
               align-items:center; justify-content:center; font-size:13px; font-weight:700}
  .cbtn .r{display:flex; align-items:center; gap:9px}
  .cbtn .eco{font-size:12px; background:rgba(255,255,255,.22); padding:3px 10px; border-radius:999px}
  /* SHEET */
  .sheet{position:fixed; inset:0; z-index:40; background:rgba(20,30,24,.4); display:none; align-items:flex-end;
         -webkit-backdrop-filter:blur(3px); backdrop-filter:blur(3px)}
  .sheet.show{display:flex}
  .panel{width:100%; max-height:88vh; border-radius:26px 26px 0 0; overflow:auto; padding:8px 16px 120px;
         background:rgba(244,247,243,.82); -webkit-backdrop-filter:var(--blur); backdrop-filter:var(--blur);
         border-top:1px solid var(--stroke)}
  .grab{width:40px; height:5px; background:rgba(120,135,125,.35); border-radius:99px; margin:8px auto 8px}
  .ptitle{font-size:21px; font-weight:700; letter-spacing:-.02em; margin:6px 4px 14px}
  .ci{border-radius:16px; padding:10px; display:flex; gap:11px; align-items:center; margin-bottom:9px;
      background:var(--glass); border:1px solid var(--stroke); box-shadow:var(--gloss);
      -webkit-backdrop-filter:blur(10px); backdrop-filter:blur(10px)}
  .ci .th{width:50px; height:50px; flex:none; border-radius:11px; background:rgba(255,255,255,.6); display:flex;
          align-items:center; justify-content:center; overflow:hidden; position:relative}
  .ci .th img.pim{position:relative; z-index:1; max-width:100%; max-height:100%; object-fit:contain}
  .ci .th img.pim.dead{display:none}
  .ci .th .e{position:absolute; inset:0; display:none; align-items:center; justify-content:center; font-size:24px; opacity:.5}
  .ci .th .e.show{display:flex} .ci .th img.pim.dead ~ .e{display:flex}
  .ci .info{flex:1; min-width:0}
  .ci .nm{font-size:13px; font-weight:600; line-height:1.25; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden}
  .ci .mt{font-size:11px; color:var(--soft); margin-top:3px; display:flex; align-items:center; gap:6px}
  .ci .src{font-size:9px; padding:2px 6px}
  .ci .st{display:flex; align-items:center; gap:8px}
  .ci .sbx{width:32px; height:32px; border:0; background:rgba(255,255,255,.75); border-radius:9px; font-size:18px; font-weight:700; color:var(--ink); box-shadow:0 1px 2px rgba(0,0,0,.06)}
  .ci .qn{font-size:14px; font-weight:700; min-width:18px; text-align:center}
  .empty{text-align:center; color:var(--soft); padding:50px 24px; font-size:14.5px; line-height:1.6}
  .empty .e{font-size:40px; display:block; margin-bottom:10px}
  .tot{border-radius:18px; padding:15px 17px; margin-top:8px; background:var(--glass-strong);
       border:1px solid var(--stroke); box-shadow:var(--gloss); -webkit-backdrop-filter:var(--blur); backdrop-filter:var(--blur)}
  .tot .l{display:flex; justify-content:space-between; font-size:14px; padding:4px 0; color:var(--soft)}
  .tot .l span:last-child{color:var(--ink); font-weight:600}
  .tot .l.eco span:last-child{color:var(--green)}
  .tot .l.big{font-size:18px; font-weight:750; color:var(--ink); border-top:1px solid var(--hair); margin-top:8px; padding-top:11px}
  .valbtn{position:sticky; bottom:0; margin-top:14px; width:100%; border:0; padding:16px; border-radius:16px; color:#fff; font-size:16px; font-weight:700;
          background:rgba(15,122,79,.95); box-shadow:var(--gloss), 0 8px 22px rgba(15,122,79,.32)}
</style>
</head>
<body>
<header>
  <div class="hrow">
    <div class="brand">🧺 Promos Paco</div>
  </div>
  <div class="majs">
    <span class="maj"><span class="dot metro"></span>Metro · <b id="majMetro">…</b></span>
    <span class="maj"><span class="dot degr"></span>Degrenne · <b id="majDegr">…</b></span>
  </div>
  <div class="nav" id="nav"></div>
</header>
<main id="main"></main>

<div class="cartbar" id="cartbar">
  <button class="cbtn" id="openCart">
    <span class="l"><span class="badge" id="cbN">0</span><span id="cbL">articles</span></span>
    <span class="r"><span class="eco" id="cbEco"></span><span id="cbTot">0,00 €</span></span>
  </button>
</div>

<div class="sheet" id="sheet">
  <div class="panel">
    <div class="grab"></div>
    <div class="ptitle">Ton panier</div>
    <div id="cartList"></div>
    <div class="tot" id="totBox" style="display:none">
      <div class="l"><span>Sous-total</span><span id="tSub">0,00 €</span></div>
      <div class="l eco"><span>Économie réalisée</span><span id="tEco">0,00 €</span></div>
      <div class="l big"><span>Total</span><span id="tTot">0,00 €</span></div>
    </div>
    <button class="valbtn" id="valBtn" style="display:none" onclick="passerCommande()">Passer la commande</button>
  </div>
</div>

<script>
const tg = window.Telegram ? window.Telegram.WebApp : null;
if(tg){ tg.ready(); tg.expand(); }
const eur = n => (Math.round((n||0)*100)/100).toFixed(2).replace('.',',')+' €';
function daysLeft(iso){ if(!iso) return null; const end=new Date(iso+'T23:59:59'); return Math.ceil((end-new Date())/86400000); }
function endsLabel(dl){ return dl<=0 ? 'Dernier jour' : (dl===1 ? "Plus qu'1 jour" : ('Plus que '+dl+' jours')); }
let DATA=null, cart={};
const SRC = s => s==='metro' ? 'METRO' : (s==='degrenne'?'DEGRENNE':s.toUpperCase());

function rayon(n){ n=(n||'').toLowerCase();
  const P=[['🍺','biere bière heineken grimbergen leffe corona desperados kro pelforth blonde delirium'],
    ['🥃','vodka whisky rhum gin tequila absolut chivas jack ricard pastis cognac don julio'],
    ['🍷','vin igp rosé rose bordeaux dauphins cellier chardonnay tropez champagne baron mouton'],
    ['⚡','red bull energ monster'],['🥤','coca soda pepsi orangina oasis lipton fanta sprite candy'],
    ['🧃','capri jus nectar pulco'],['🥐','croissant pain brioche chocolatine viennoiserie rochambeau'],
    ['🍫','chocolat kit kat twix snickers lion bounty mars milka kinder oreo nutella côte chenet'],
    ['🧀','cheddar gouda emmental fromage philadelphia mozzarella comté'],
    ['🍪','biscuit gateau gaufre pringles chips doritos lays granola palmito lu'],
    ['🧴','raid nettoyant lessive gel javel detergent k2r spray beckmann spontex']];
  for(const it of P){ if(it[1].split(' ').some(k=>n.includes(k))) return it[0]; }
  return '🛒';
}
function imgBox(it){
  const emo=rayon(it.name);
  const fb = `<div class="fb"><span class="e">${emo}</span><span class="f">${it.format||''}</span></div>`;
  if(!it.image) return `<div class="fb show"><span class="e">${emo}</span><span class="f">${it.format||''}</span></div>`;
  return `<img class="pim" loading="lazy" src="${it.image}" alt="" onerror="this.classList.add('dead')">`+fb;
}
function ctrl(it){
  const c=cart[it.id];
  if(!c) return `<button class="add" onclick="chg(${it.id},1)">＋ Ajouter</button>`;
  return `<div class="stepper"><button class="sb" onclick="chg(${it.id},-1)">−</button>
    <span class="sn">${c.qty}</span><button class="sb" onclick="chg(${it.id},1)">+</button></div>`;
}
function cardHTML(it){
  let badges=''; if(it.remise>0) badges+=`<span class="pill remise">−${it.remise}%</span>`;
  const old = it.barre ? `<span class="pold">${eur(it.barre)}</span>` : '';
  let metas='';
  const dl=daysLeft(it.ends_date);
  if(dl!=null){ const soon=dl<=2; metas+=`<span class="tag ends${soon?' soon':''}">⏳ ${endsLabel(dl)}</span>`; }
  else if(it.ends){ metas+=`<span class="tag ends">⏳ ${it.ends}</span>`; }
  if(it.compare){ const c=it.compare; const oth=c.source==='degrenne'?'Degrenne':'Metro';
    const op=(c.basis==='mesure'&&c.mesure)?eur(c.mesure)+'/'+c.unit:eur(c.prix);
    metas += c.cheaper_here
      ? `<span class="tag best">✓ Meilleur prix ici · ${oth} ${op}</span>`
      : `<span class="tag warn">↘ Moins cher chez ${oth} · ${op}</span>`; }
  if(it.sous_habituel) metas+=`<span class="tag eco">−${it.sous_habituel}% sous ton prix habituel</span>`;
  if(it.reason) metas+=`<span class="reason"><span class="ck">✓</span><span>${it.reason}</span></span>`;
  return `<div class="card" id="c${it.id}">
    <div class="ph">${imgBox(it)}<div class="tl">${badges}</div></div>
    <div class="cbody">
      ${it.marque?`<div class="marque">${it.marque}</div>`:''}
      <div class="name">${it.name}</div>
      <div class="fmt">${it.format?it.format+' · ':''}<span class="srcx ${it.source}">${it.source==='degrenne'?'Degrenne':'Metro'}</span></div>
      <div class="prow"><span class="pnow">${eur(it.prix)}</span><span class="punit">${it.unit_noun||''}</span>${old}</div>
      ${it.prix_mesure?`<div class="pmes">soit ${eur(it.prix_mesure)}/${it.mesure_unit}${it.prix_ttc?' · '+eur(it.prix_ttc)+' TTC':''}</div>`:''}
      <div class="meta">${metas}</div>
      ${ctrl(it)}
    </div></div>`;
}
function compareCardHTML(c){
  const mes=s=> s.mesure?`<div class="cc-mes">${eur(s.mesure)}/${s.unit}</div>`:'';
  const side=(s,nm,cls,win)=>`<div class="cc-side ${win?'win':'lose'}">
      <div class="cc-src ${cls}">${nm}</div><div class="cc-px">${eur(s.prix)}</div>${mes(s)}
      ${win?'<div class="cc-tag">le moins cher</div>':''}</div>`;
  const ch=c.cheaper==='metro'?'Metro':'Degrenne';
  const img=c.image?`<img src="${c.image}" onerror="this.replaceWith(document.createTextNode('${rayon(c.name)}'))">`:rayon(c.name);
  return `<div class="ccard">
    <div class="cc-head"><div class="cc-img">${img}</div>
      <div>${c.marque?`<div class="marque">${c.marque}</div>`:''}<div class="cc-name">${c.name}</div></div></div>
    <div class="cc-vs">${side(c.metro,'METRO','metro',c.cheaper==='metro')}${side(c.degrenne,'DEGRENNE','degrenne',c.cheaper==='degrenne')}</div>
    <div class="cc-eco">✓ <b>${ch}</b> moins cher de <b>${c.pct}%</b>${c.eco?` · éco ${eur(c.eco)}/pièce`:''}</div>
    <button class="add" onclick="addCompare('${c.cheaper}',${c.cheaper==='metro'?c.metro.id:c.degrenne.id})">＋ Ajouter le moins cher</button>
  </div>`;
}
function addCompare(src,id){
  for(const s of DATA.sections){ if(s.type!=='compare') continue;
    for(const c of s.items){ const side=src==='metro'?c.metro:c.degrenne;
      if(side.id===id){ const item={id,name:c.name,source:src,prix:side.prix,image:c.image,unit_noun:'',barre:null,remise:0};
        cart[id]={item,qty:(cart[id]?cart[id].qty:0)+1}; refreshCart();
        if(tg&&tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light'); return; } } }
}
function render(){
  const sm=v=>v||'—';
  document.getElementById('majMetro').textContent = sm(DATA.updated_metro);
  document.getElementById('majDegr').textContent = sm(DATA.updated_degrenne);
  const nav=document.getElementById('nav'); nav.innerHTML='';
  const main=document.getElementById('main'); main.innerHTML='';
  DATA.sections.forEach((s,i)=>{
    const isCmp = s.type==='compare';
    const items = isCmp ? (s.items||[]) : s.items.filter(it=>{ const dl=daysLeft(it.ends_date); return dl==null || dl>=0; });
    if(!items.length) return;
    const c=document.createElement('button'); c.className='chip'+(i===0?' on':''); c.textContent=(s.emoji||'')+' '+s.titre;
    c.onclick=()=>{ const el=document.getElementById('sec'+i); if(el) el.scrollIntoView({behavior:'smooth',block:'start'});
      document.querySelectorAll('.chip').forEach(x=>x.classList.remove('on')); c.classList.add('on'); };
    nav.appendChild(c);
    const sec=document.createElement('section'); sec.id='sec'+i;
    const body = isCmp ? `<div class="clist">${items.map(compareCardHTML).join('')}</div>`
                       : `<div class="grid">${items.map(cardHTML).join('')}</div>`;
    sec.innerHTML=`<div class="shead"><div class="semoji">${s.emoji||'🛒'}</div>
      <div><div class="stitle">${s.titre}</div><div class="ssub">${s.sub||''}</div></div></div>`+body;
    main.appendChild(sec);
  });
}
function findItem(id){ for(const s of DATA.sections){ const f=s.items.find(x=>x.id===id); if(f) return f; } return null; }
function chg(id,d){
  const it=findItem(id); if(!it) return;
  const q=(cart[id]?cart[id].qty:0)+d;
  if(q<=0) delete cart[id]; else cart[id]={item:it,qty:q};
  const el=document.getElementById('c'+id); if(el) el.outerHTML=cardHTML(it);
  refreshCart(); if(tg&&tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
}
function totals(){ let sub=0,eco=0,n=0; for(const k in cart){ const {item,qty}=cart[k];
  sub+=item.prix*qty; n+=qty; if(item.barre&&item.barre>item.prix) eco+=(item.barre-item.prix)*qty; } return {sub,eco,n}; }
function refreshCart(){
  const {sub,eco,n}=totals();
  document.getElementById('cartbar').classList.toggle('show', n>0);
  document.getElementById('cbN').textContent=n;
  document.getElementById('cbL').textContent='Voir mon panier';
  document.getElementById('cbTot').textContent=eur(sub);
  const e=document.getElementById('cbEco'); if(eco>0){e.textContent='éco '+eur(eco); e.style.display='';} else e.style.display='none';
  if(tg){ if(n>0){ tg.MainButton.setText('🛒 Voir mon panier · '+eur(sub)); tg.MainButton.show(); } else tg.MainButton.hide(); }
  if(document.getElementById('sheet').classList.contains('show')) renderCart();
}
function renderCart(){
  const list=document.getElementById('cartList'); const ks=Object.keys(cart);
  const box=document.getElementById('totBox'), btn=document.getElementById('valBtn');
  if(!ks.length){ list.innerHTML=`<div class="empty"><span class="e">🧺</span>Ton panier est vide.<br>Ajoute des promos pour démarrer.</div>`;
    box.style.display='none'; btn.style.display='none'; return; }
  list.innerHTML=ks.map(k=>{ const {item,qty}=cart[k];
    const th=item.image?`<img class="pim" src="${item.image}" onerror="this.classList.add('dead')"><span class="e">🧺</span>`:`<span class="e show">🧺</span>`;
    return `<div class="ci"><div class="th">${th}</div>
      <div class="info"><div class="nm">${item.name}</div>
        <div class="mt"><span class="src ${item.source}">${SRC(item.source)}</span>${eur(item.prix)} ${item.unit_noun||''}</div></div>
      <div class="st"><button class="sbx" onclick="chg(${item.id},-1)">−</button>
        <span class="qn">${qty}</span><button class="sbx" onclick="chg(${item.id},1)">+</button></div></div>`;
  }).join('');
  const {sub,eco}=totals();
  box.style.display='block'; btn.style.display='block';
  document.getElementById('tSub').textContent=eur(sub);
  document.getElementById('tEco').textContent=eco>0?('− '+eur(eco)):'0,00 €';
  document.getElementById('tTot').textContent=eur(sub);
}
document.getElementById('openCart').onclick=()=>{ renderCart(); document.getElementById('sheet').classList.add('show'); };
document.getElementById('sheet').onclick=e=>{ if(e.target.id==='sheet') document.getElementById('sheet').classList.remove('show'); };
function passerCommande(){
  const items=Object.values(cart).map(({item,qty})=>({id:item.id,name:item.name,source:item.source,prix:item.prix,qty}));
  if(!items.length) return;
  const payload=JSON.stringify({action:'order',items});
  if(tg) tg.sendData(payload); else alert('Commande:\n'+payload);
}
if(tg){ tg.MainButton.onClick(()=>document.getElementById('openCart').click());
  tg.MainButton.color=getComputedStyle(document.documentElement).getPropertyValue('--degrenne').trim()||'#0f7a4f';
  tg.MainButton.textColor='#ffffff'; }
fetch('promos.json?t='+Date.now()).then(r=>r.json()).then(d=>{ DATA=d; render(); refreshCart(); })
  .catch(e=>{ document.getElementById('main').innerHTML=`<div class="empty"><span class="e">😕</span>Impossible de charger les promos.<br>${e}</div>`; });
</script>
</body>
</html>
